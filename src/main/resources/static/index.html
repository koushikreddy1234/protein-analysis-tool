<!DOCTYPE html>
<html>
<head>
    <title>Protein 3D Viewer</title>

    <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            width: 95%;
            max-width: 1300px;
            margin: auto;
            margin-top: 20px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        .controls {
            text-align: center;
            margin-bottom: 15px;
        }

        input {
            padding: 10px;
            width: 200px;
            border-radius: 6px;
            border: none;
            margin: 5px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .main-content {
            display: flex;
            gap: 20px;
        }

        .viewer-box {
            flex: 1;
            height: 500px;
            background: black; /* ✅ CHANGED */
            border-radius: 10px;
            position: relative;
        }

        .viewer {
            width: 100%;
            height: 100%;
        }

        .label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 14px;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Protein 3D Viewer (Compare)</h1>

    <div class="card">

        <div class="controls">
            <input id="protein1" placeholder="Protein 1 (e.g. 1CRN)">
            <input id="protein2" placeholder="Protein 2 (e.g. 4HHB)">
            <button onclick="loadProteins()">Compare</button>
        </div>

        <div class="main-content">

            <!-- LEFT -->
            <div class="viewer-box">
                <div class="label">Protein 1</div>
                <div id="viewer1" class="viewer"></div>
            </div>

            <!-- RIGHT -->
            <div class="viewer-box">
                <div class="label">Protein 2</div>
                <div id="viewer2" class="viewer"></div>
            </div>

        </div>

    </div>

</div>

<script>

let viewer1 = null;
let viewer2 = null;

function loadProteins() {

    let id1 = document.getElementById("protein1").value.toUpperCase();
    let id2 = document.getElementById("protein2").value.toUpperCase();

    if (!id1 || !id2) {
        alert("Enter BOTH Protein IDs");
        return;
    }

    let base = "https://protein-analysis-tool.onrender.com/protein/";

    // create viewers with BLACK background
    viewer1 = $3Dmol.createViewer("viewer1", { backgroundColor: "black" });
    viewer2 = $3Dmol.createViewer("viewer2", { backgroundColor: "black" });

    // load protein 1
    fetch(base + id1)
    .then(res => res.text())
    .then(data => {
        viewer1.addModel(data, "pdb");
        viewer1.setStyle({}, {cartoon: {color: "cyan"}});
        viewer1.zoomTo();
        viewer1.render();

        setTimeout(() => viewer1.resize(), 200);
    })
    .catch(() => alert("Protein 1 failed"));

    // load protein 2
    fetch(base + id2)
    .then(res => res.text())
    .then(data => {
        viewer2.addModel(data, "pdb");
        viewer2.setStyle({}, {cartoon: {color: "orange"}});
        viewer2.zoomTo();
        viewer2.render();

        setTimeout(() => viewer2.resize(), 200);
    })
    .catch(() => alert("Protein 2 failed"));
}

</script>

</body>
</html>
