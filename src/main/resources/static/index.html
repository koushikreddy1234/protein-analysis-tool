<!DOCTYPE html>
<html>
<head>
    <title>Protein 3D Viewer</title>

    <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            width: 95%;
            max-width: 1300px;
            margin: auto;
            margin-top: 20px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        .controls {
            text-align: center;
            margin-bottom: 10px;
        }

        input {
            padding: 10px;
            width: 200px;
            border-radius: 6px;
            border: none;
            margin: 5px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        .style-buttons {
            text-align: center;
            margin-bottom: 10px;
        }

        .style-buttons button {
            background: #3b82f6;
            margin: 5px;
        }

        .main-content {
            display: flex;
            gap: 20px;
        }

        .viewer-wrapper {
            flex: 2;
            height: 500px;
            background: white;
            border-radius: 10px;
        }

        #viewer {
            width: 100%;
            height: 100%;
        }

        .info-panel {
            flex: 1;
            background: #334155;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Protein 3D Viewer</h1>

    <div class="card">

        <!-- ✅ TWO INPUTS -->
        <div class="controls">
            <input id="protein1" placeholder="Protein 1 (e.g. 1CRN)">
            <input id="protein2" placeholder="Protein 2 (e.g. 4HHB)">
            <button onclick="loadProtein()">Compare</button>
        </div>

        <div class="style-buttons">
            <button onclick="setStyle('cartoon')">Cartoon</button>
            <button onclick="setStyle('stick')">Stick</button>
            <button onclick="setStyle('sphere')">Sphere</button>
        </div>

        <div class="main-content">

            <div class="viewer-wrapper">
                <div id="viewer"></div>
            </div>

            <div class="info-panel">
                <h3>Protein Info</h3>
                <p id="info">Load proteins to compare</p>
            </div>

        </div>

    </div>

</div>

<script>
let viewer = null;

function loadProtein() {

    let id1 = document.getElementById("protein1").value.toUpperCase();
    let id2 = document.getElementById("protein2").value.toUpperCase();

    if (!id1 || !id2) {
        alert("Enter BOTH Protein IDs");
        return;
    }

    if (viewer) {
        viewer.clear();
    } else {
        viewer = $3Dmol.createViewer("viewer", {
            backgroundColor: "white"
        });
    }

    let base = "https://protein-analysis-tool.onrender.com/protein/";

    Promise.all([
        fetch(base + id1).then(res => res.text()),
        fetch(base + id2).then(res => res.text())
    ])
    .then(([data1, data2]) => {

        viewer.addModel(data1, "pdb");
        viewer.addModel(data2, "pdb");

        viewer.setStyle({model:0}, {cartoon:{color:"blue"}});
        viewer.setStyle({model:1}, {cartoon:{color:"red"}});

        viewer.zoomTo();
        viewer.render();

        // 🔥 CRITICAL FIX
        setTimeout(() => {
            viewer.resize();
            viewer.zoomTo();
            viewer.render();
        }, 200);

    })
    .catch(err => {
        console.error(err);
        alert("Error loading proteins");
    });
}
function setStyle(type) {

    if (!viewer) return;

    if (type === "cartoon") {

        viewer.setStyle({}, {cartoon: {color: "spectrum"}});

    }

    if (type === "stick") {

        viewer.setStyle({}, {stick: {}});

    }

    if (type === "sphere") {

        viewer.setStyle({}, {sphere: {}});

    }

    viewer.render();

}

// resize fix

window.addEventListener("resize", () => {

    if (viewer) {

        viewer.resize();

        viewer.render();

    }

});

</script>
