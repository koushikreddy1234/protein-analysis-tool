<!DOCTYPE html>
<html>
<head>
    <title>Protein 3D Viewer</title>

    <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            width: 95%;
            max-width: 1300px;
            margin: auto;
            margin-top: 20px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        .controls {
            text-align: center;
            margin-bottom: 10px;
        }

        input {
            padding: 10px;
            width: 220px;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 10px 15px;
            margin-left: 10px;
            border: none;
            border-radius: 6px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .style-buttons {
            text-align: center;
            margin-bottom: 10px;
        }

        .style-buttons button {
            background: #3b82f6;
            margin: 5px;
        }

        .main-content {
            display: flex;
            gap: 20px;
        }

        .viewer-wrapper {
            flex: 2;
            height: 500px;
            position: relative;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        #viewer {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .info-panel {
            flex: 1;
            background: #334155;
            padding: 15px;
            border-radius: 10px;
        }

        #loading {
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Protein 3D Viewer</h1>

    <div class="card">

        <div class="controls">
            <input type="text" id="proteinId" placeholder="Enter PDB ID (e.g. 1CRN)">
            <button onclick="loadProtein()">Load Protein</button>
        </div>

        <div class="style-buttons">
            <button onclick="setStyle('cartoon')">Cartoon</button>
            <button onclick="setStyle('stick')">Stick</button>
            <button onclick="setStyle('sphere')">Sphere</button>
        </div>

        <div id="loading">Loading protein...</div>

        <div class="main-content">

            <div class="viewer-wrapper">
                <div id="viewer"></div>
            </div>

            <div class="info-panel">
                <h3>Protein Info</h3>
                <p><b>ID:</b> <span id="pdbId">-</span></p>
                <p><b>Title:</b> <span id="title">-</span></p>
                <p><b>Organism:</b> <span id="organism">-</span></p>
                <p><b>Method:</b> <span id="method">-</span></p>
                <p><b>Resolution:</b> <span id="resolution">-</span></p>
            </div>

        </div>

    </div>

</div>

<script>

let viewer1, viewer2;

function loadProtein() {

    let id1 = document.getElementById("proteinId").value.toUpperCase();

    if (!id1) {
        alert("Enter Protein ID");
        return;
    }

    let id2 = prompt("Enter second protein ID");

    document.getElementById("loading").style.display = "block";
    document.getElementById("viewer").innerHTML = "";

    setTimeout(() => {

        document.getElementById("viewer").innerHTML =
            '<div id="v1" style="width:50%;height:100%;float:left;"></div>' +
            '<div id="v2" style="width:50%;height:100%;float:left;"></div>';

        viewer1 = $3Dmol.createViewer("v1", {backgroundColor:"white"});
        viewer2 = $3Dmol.createViewer("v2", {backgroundColor:"white"});

        let base = "https://protein-analysis-tool.onrender.com/protein/";

        fetch(base + id1)
        .then(res => res.text())
        .then(data => {
            viewer1.addModel(data, "pdb");
            viewer1.setStyle({}, {cartoon:{color:"spectrum"}});
            viewer1.zoomTo();
            viewer1.render();
        });

        if (id2) {
            fetch(base + id2.toUpperCase())
            .then(res => res.text())
            .then(data => {
                viewer2.addModel(data, "pdb");
                viewer2.setStyle({}, {cartoon:{color:"spectrum"}});
                viewer2.zoomTo();
                viewer2.render();
            });
        }

    }, 100);

    fetch("https://data.rcsb.org/rest/v1/core/entry/" + id1)
    .then(res => res.json())
    .then(info => {
        document.getElementById("pdbId").innerText = id1;
        document.getElementById("title").innerText = info.struct?.title || "-";
        document.getElementById("method").innerText = info.exptl?.[0]?.method || "-";
        document.getElementById("resolution").innerText = info.rcsb_entry_info?.resolution_combined?.[0] || "-";
        document.getElementById("organism").innerText =
            info.rcsb_entity_source_organism?.[0]?.scientific_name || "-";
    });

    document.getElementById("loading").style.display = "none";
}

function setStyle(type){

    if(viewer1){
        viewer1.setStyle({}, {[type]:{}});
        viewer1.render();
    }

    if(viewer2){
        viewer2.setStyle({}, {[type]:{}});
        viewer2.render();
    }
}

</script>

</body>
</html>
