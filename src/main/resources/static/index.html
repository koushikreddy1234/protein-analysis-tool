<!DOCTYPE html>
<html>
<head>
    <title>Protein 3D Viewer</title>

    <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            width: 95%;
            max-width: 1300px;
            margin: auto;
            margin-top: 20px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        .controls {
            text-align: center;
            margin-bottom: 10px;
        }

        input {
            padding: 10px;
            width: 200px;
            border-radius: 6px;
            border: none;
            margin: 5px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        .style-buttons {
            text-align: center;
            margin-bottom: 10px;
        }

        .style-buttons button {
            background: #3b82f6;
            margin: 5px;
        }

        .main-content {
            display: flex;
            gap: 20px;
        }

        .viewer-wrapper {
            flex: 2;
            height: 500px;
            background: white;
            border-radius: 10px;
        }

        #viewer {
            width: 100%;
            height: 100%;
        }

        .info-panel {
            flex: 1;
            background: #334155;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Protein 3D Viewer</h1>

    <div class="card">

        <!-- ✅ TWO INPUTS -->
        <div class="controls">
            <input id="protein1" placeholder="Protein 1 (e.g. 1CRN)">
            <input id="protein2" placeholder="Protein 2 (e.g. 4HHB)">
            <button onclick="loadProtein()">Compare</button>
        </div>

        <div class="style-buttons">
            <button onclick="setStyle('cartoon')">Cartoon</button>
            <button onclick="setStyle('stick')">Stick</button>
            <button onclick="setStyle('sphere')">Sphere</button>
        </div>

        <div class="main-content">

            <div class="viewer-wrapper">
                <div id="viewer"></div>
            </div>

            <div class="info-panel">
                <h3>Protein Info</h3>
                <p id="info">Load proteins to compare</p>
            </div>

        </div>

    </div>

</div>

<script>

let viewer;

function loadProtein() {

    let p1 = document.getElementById("protein1").value.toUpperCase();
    let p2 = document.getElementById("protein2").value.toUpperCase();

    if (!p1 || !p2) {
        alert("Enter BOTH proteins");
        return;
    }

    viewer = $3Dmol.createViewer("viewer", {backgroundColor:"white"});

    let base = "https://protein-analysis-tool.onrender.com/protein/";

    // 🔥 Protein 1 (BLUE)
    fetch(base + p1)
    .then(res => res.text())
    .then(data => {
        viewer.addModel(data, "pdb");
        viewer.setStyle({model:0}, {cartoon:{color:"blue"}});
        viewer.zoomTo();
        viewer.render();
    });

    // 🔥 Protein 2 (RED)
    fetch(base + p2)
    .then(res => res.text())
    .then(data => {
        viewer.addModel(data, "pdb");
        viewer.setStyle({model:1}, {cartoon:{color:"red"}});
        viewer.zoomTo();
        viewer.render();
    });

    // INFO
    document.getElementById("info").innerText =
        "Comparing " + p1 + " (blue) vs " + p2 + " (red)";
}

function setStyle(type){

    if(!viewer) return;

    if(type === "cartoon"){
        viewer.setStyle({}, {cartoon:{}});
    }

    if(type === "stick"){
        viewer.setStyle({}, {stick:{}});
    }

    if(type === "sphere"){
        viewer.setStyle({}, {sphere:{}});
    }

    viewer.render();
}

</script>

</body>
</html>
