<!DOCTYPE html>
<html>
<head>
    <title>Protein Viewer</title>

    <!-- 3Dmol library -->
    <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f5f5f5;
        }

        #viewer1, #viewer2 {
            width: 45%;
            height: 500px;
            display: inline-block;
            margin: 10px;
            border: 1px solid #ccc;
            background: white;
        }

        input {
            padding: 8px;
            margin: 10px;
            width: 150px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>Protein Viewer</h2>

<input type="text" id="id1" placeholder="Protein ID 1 (e.g. 1crn)">
<input type="text" id="id2" placeholder="Protein ID 2 (e.g. 4hhb)">

<br>

<button onclick="loadProteins()">Load Proteins</button>

<br><br>

<div id="viewer1"></div>
<div id="viewer2"></div>

<script>
function loadProteins() {

    const id1 = document.getElementById("id1").value.trim();
    const id2 = document.getElementById("id2").value.trim();

    if (!id1 || !id2) {
        alert("Enter both protein IDs");
        return;
    }

    // Viewer 1
    fetch("/protein/" + id1)
        .then(res => res.text())
        .then(data => {
            const viewer1 = $3Dmol.createViewer("viewer1", { backgroundColor: "white" });

            viewer1.clear();
            viewer1.addModel(data, "pdb");
            viewer1.setStyle({}, { cartoon: { color: "spectrum" } });
            viewer1.zoomTo();
            viewer1.render();
        })
        .catch(err => console.error("Error loading protein 1:", err));

    // Viewer 2
    fetch("/protein/" + id2)
        .then(res => res.text())
        .then(data => {
            const viewer2 = $3Dmol.createViewer("viewer2", { backgroundColor: "white" });

            viewer2.clear();
            viewer2.addModel(data, "pdb");
            viewer2.setStyle({}, { cartoon: { color: "spectrum" } });
            viewer2.zoomTo();
            viewer2.render();
        })
        .catch(err => console.error("Error loading protein 2:", err));
}
</script>

</body>
</html>
