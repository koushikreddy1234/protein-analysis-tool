<!DOCTYPE html>
<html>
<head>
    <title>Protein 3D Viewer</title>

    <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            width: 95%;
            max-width: 1300px;
            margin: auto;
            margin-top: 20px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }

        .controls {
            text-align: center;
            margin-bottom: 10px;
        }

        input {
            padding: 10px;
            width: 220px;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 10px 15px;
            margin-left: 10px;
            border: none;
            border-radius: 6px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .style-buttons {
            text-align: center;
            margin-bottom: 10px;
        }

        .style-buttons button {
            background: #3b82f6;
            margin: 5px;
        }

        /* 🔥 MAIN LAYOUT */
        .main-content {
            display: flex;
            gap: 20px;
        }

        /* 🔥 VIEWER FIX */
        .viewer-wrapper {
            flex: 2;
            height: 500px;
            min-height: 500px;
            position: relative;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        #viewer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        /* INFO PANEL */
        .info-panel {
            flex: 1;
            background: #334155;
            padding: 15px;
            border-radius: 10px;
        }

        #loading {
            text-align: center;
            display: none;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Protein 3D Viewer</h1>

    <div class="card">

        <div class="controls">
            <input type="text" id="proteinId" placeholder="Enter PDB ID (e.g. 1CRN)">
            <button onclick="loadProtein()">Load Protein</button>
        </div>

        <div class="style-buttons">
            <button onclick="setStyle('cartoon')">Cartoon</button>
            <button onclick="setStyle('stick')">Stick</button>
            <button onclick="setStyle('sphere')">Sphere</button>
        </div>

        <div id="loading">Loading protein...</div>

        <div class="main-content">

            <!-- VIEWER -->
            <div class="viewer-wrapper">
                <div id="viewer"></div>
            </div>

            <!-- INFO -->
            <div class="info-panel">
                <h3>Protein Info</h3>
                <p><b>ID:</b> <span id="pdbId">-</span></p>
                <p><b>Title:</b> <span id="title">-</span></p>
                <p><b>Organism:</b> <span id="organism">-</span></p>
                <p><b>Method:</b> <span id="method">-</span></p>
                <p><b>Resolution:</b> <span id="resolution">-</span></p>
            </div>

        </div>

    </div>

</div>

<script>

let viewer;

function loadProtein() {

    let id = document.getElementById("proteinId").value.toUpperCase();

    if (!id) {
        alert("Enter Protein ID");
        return;
    }

    document.getElementById("loading").style.display = "block";

    document.getElementById("viewer").innerHTML = "";

    // 🔥 DELAY FIX (important)
    setTimeout(() => {

        viewer = $3Dmol.createViewer("viewer", {
            backgroundColor: "white"
        });

        // BACKEND CALL
        fetch("http://localhost:8080/protein/" + id)
        .then(res => res.text())
        .then(data => {

            viewer.addModel(data, "pdb");

            viewer.setStyle({}, {cartoon: {color: "spectrum"}});

            viewer.zoomTo();
            viewer.render();

            // 🔥 DOUBLE RESIZE FIX
            viewer.resize();

            setTimeout(() => {
                viewer.resize();
                viewer.zoomTo();
                viewer.render();
            }, 200);

        })
        .catch(() => {
            alert("Error loading protein");
        });

    }, 100);

    // METADATA
    fetch("https://data.rcsb.org/rest/v1/core/entry/" + id)
    .then(res => res.json())
    .then(info => {

        document.getElementById("pdbId").innerText = id;
        document.getElementById("title").innerText =
            info.struct?.title || "Not available";

        document.getElementById("method").innerText =
            info.exptl?.[0]?.method || "Not available";

        document.getElementById("resolution").innerText =
            info.rcsb_entry_info?.resolution_combined?.[0] || "Not available";

        document.getElementById("organism").innerText =
            info.rcsb_entity_source_organism?.[0]?.scientific_name || "Not available";

    });

    document.getElementById("loading").style.display = "none";
}

function setStyle(type) {

    if (!viewer) return;

    if (type === "cartoon") {
        viewer.setStyle({}, {cartoon: {color: "spectrum"}});
    }

    if (type === "stick") {
        viewer.setStyle({}, {stick: {}});
    }

    if (type === "sphere") {
        viewer.setStyle({}, {sphere: {}});
    }

    viewer.render();
}

// 🔥 WINDOW RESIZE FIX
window.addEventListener("resize", () => {
    if (viewer) {
        viewer.resize();
        viewer.render();
    }
});

</script>

</body>
</html>
