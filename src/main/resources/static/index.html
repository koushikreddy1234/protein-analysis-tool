<script>

let viewer1, viewer2;
let seq1 = "", seq2 = "";

/* LOAD PROTEINS */
function loadProtein() {

    let id1 = document.getElementById("proteinId").value.toUpperCase();

    if (!id1) {
        alert("Enter Protein ID");
        return;
    }

    // OPTIONAL: second protein prompt (no UI change)
    let id2 = prompt("Enter second protein ID for comparison (optional):");

    document.getElementById("loading").style.display = "block";
    document.getElementById("viewer").innerHTML = "";

    setTimeout(() => {

        // 🔥 CREATE TWO VIEWERS SIDE BY SIDE INSIDE SAME BOX
        document.getElementById("viewer").innerHTML =
            '<div id="v1" style="width:50%;height:100%;float:left;"></div>' +
            '<div id="v2" style="width:50%;height:100%;float:left;"></div>';

        viewer1 = $3Dmol.createViewer("v1", { backgroundColor: "white" });
        viewer2 = $3Dmol.createViewer("v2", { backgroundColor: "white" });

        let base = "https://protein-analysis-tool.onrender.com/protein/";

        // ===== PROTEIN 1 =====
        fetch(base + id1)
        .then(res => res.text())
        .then(data => {

            viewer1.addModel(data, "pdb");
            viewer1.setStyle({}, {cartoon: {color: "spectrum"}});
            viewer1.zoomTo();
            viewer1.render();

        });

        // ===== PROTEIN 2 =====
        if (id2) {
            fetch(base + id2.toUpperCase())
            .then(res => res.text())
            .then(data => {

                viewer2.addModel(data, "pdb");
                viewer2.setStyle({}, {cartoon: {color: "spectrum"}});
                viewer2.zoomTo();
                viewer2.render();

            });

            loadSequences(id1, id2);
        }

    }, 100);

    // INFO (only first protein shown as before)
    fetch("https://data.rcsb.org/rest/v1/core/entry/" + id1)
    .then(res => res.json())
    .then(info => {

        document.getElementById("pdbId").innerText = id1;
        document.getElementById("title").innerText =
            info.struct?.title || "Not available";

        document.getElementById("method").innerText =
            info.exptl?.[0]?.method || "Not available";

        document.getElementById("resolution").innerText =
            info.rcsb_entry_info?.resolution_combined?.[0] || "Not available";

        document.getElementById("organism").innerText =
            info.rcsb_entity_source_organism?.[0]?.scientific_name || "Not available";

    });

    document.getElementById("loading").style.display = "none";
}

/* LOAD SEQUENCES */
function loadSequences(id1, id2){

    Promise.all([
        fetch("https://data.rcsb.org/rest/v1/core/polymer_entity/"+id1+"/1").then(r=>r.json()),
        fetch("https://data.rcsb.org/rest/v1/core/polymer_entity/"+id2+"/1").then(r=>r.json())
    ])
    .then(([d1, d2])=>{

        seq1 = d1.entity_poly.pdbx_seq_one_letter_code.replace(/\s/g,"");
        seq2 = d2.entity_poly.pdbx_seq_one_letter_code.replace(/\s/g,"");

        showAlignment();
    });
}

/* ALIGNMENT + DISTANCE */
function showAlignment(){

    let len = Math.min(seq1.length, seq2.length);

    let a="", b="", mid="";
    let diff = 0;

    for(let i=0;i<len;i++){

        if(seq1[i] === seq2[i]){
            a += seq1[i];
            b += seq2[i];
            mid += "|";
        } else {
            a += seq1[i];
            b += seq2[i];
            mid += " ";
            diff++;
        }
    }

    let similarity = ((len-diff)/len*100).toFixed(2);
    let distance = (diff/len).toFixed(3);

    // CREATE RESULT BOX (no UI redesign, just append)
    let result = document.createElement("div");
    result.style.marginTop = "20px";
    result.style.background = "#020617";
    result.style.padding = "10px";
    result.style.fontFamily = "monospace";
    result.style.whiteSpace = "pre-wrap";

    result.innerHTML =
        a + "\n" + mid + "\n" + b +
        "\n\nSimilarity: " + similarity + "%" +
        "\nDistance: " + distance;

    document.querySelector(".container").appendChild(result);
}

/* STYLE */
function setStyle(type){

    if(viewer1){
        viewer1.setStyle({}, {[type]:{color:"spectrum"}});
        viewer1.render();
    }

    if(viewer2){
        viewer2.setStyle({}, {[type]:{color:"spectrum"}});
        viewer2.render();
    }
}

/* RESIZE */
window.addEventListener("resize", () => {
    if (viewer1) viewer1.resize();
    if (viewer2) viewer2.resize();
});

</script>
