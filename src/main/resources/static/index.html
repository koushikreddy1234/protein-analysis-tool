<!DOCTYPE html>
<html>
<head>
<title>Protein 3D Viewer</title>

<script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    width: 95%;
    max-width: 1300px;
    margin: auto;
    margin-top: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}

.controls {
    text-align: center;
    margin-bottom: 15px;
}

input {
    padding: 10px;
    width: 200px;
    border-radius: 6px;
    border: none;
    margin: 5px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

.main-content {
    display: flex;
    gap: 20px;
}

.viewer-box {
    flex: 1;
    height: 400px;
    background: black;
    border-radius: 10px;
}

.viewer {
    width: 100%;
    height: 100%;
}

.info-box {
    margin-top: 10px;
    background: #334155;
    padding: 10px;
    border-radius: 8px;
}

.result-box {
    margin-top: 20px;
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
}

</style>
</head>

<body>

<div class="container">

<h1 style="text-align:center;">Protein Comparison Tool</h1>

<div class="card">

<div class="controls">
<input id="protein1" placeholder="Protein 1 (1CRN)">
<input id="protein2" placeholder="Protein 2 (4HHB)">
<button onclick="loadProteins()">Compare</button>
</div>

<div class="main-content">

<div>
<div id="viewer1" class="viewer-box"></div>
<div class="info-box" id="info1">Protein 1 info</div>
</div>

<div>
<div id="viewer2" class="viewer-box"></div>
<div class="info-box" id="info2">Protein 2 info</div>
</div>

</div>

<div class="result-box">
<h3>Comparison</h3>
<p><b>Sequence Similarity:</b> <span id="similarity">-</span></p>
<p><b>Phylogenetic Distance:</b> <span id="distance">-</span></p>
</div>

</div>
</div>

<script>

let viewer1, viewer2;

function loadProteins() {

let id1 = document.getElementById("protein1").value.toUpperCase();
let id2 = document.getElementById("protein2").value.toUpperCase();

let base = "https://protein-analysis-tool.onrender.com/protein/";

viewer1 = $3Dmol.createViewer("viewer1",{backgroundColor:"black"});
viewer2 = $3Dmol.createViewer("viewer2",{backgroundColor:"black"});

// load structures
Promise.all([
fetch(base+id1).then(r=>r.text()),
fetch(base+id2).then(r=>r.text())
]).then(([p1,p2])=>{

viewer1.addModel(p1,"pdb");
viewer2.addModel(p2,"pdb");

viewer1.setStyle({}, {cartoon:{color:"cyan"}});
viewer2.setStyle({}, {cartoon:{color:"orange"}});

viewer1.zoomTo(); viewer1.render();
viewer2.zoomTo(); viewer2.render();

// 🔥 extract sequences
let seq1 = extractSequence(p1);
let seq2 = extractSequence(p2);

// 🔥 compare
let sim = similarity(seq1, seq2);
document.getElementById("similarity").innerText = sim + "%";
document.getElementById("distance").innerText = (1 - sim/100).toFixed(2);

});

// metadata
fetch("https://data.rcsb.org/rest/v1/core/entry/"+id1)
.then(r=>r.json()).then(d=>{
document.getElementById("info1").innerHTML =
"<b>"+d.struct.title+"</b><br>"+d.exptl[0].method;
});

fetch("https://data.rcsb.org/rest/v1/core/entry/"+id2)
.then(r=>r.json()).then(d=>{
document.getElementById("info2").innerHTML =
"<b>"+d.struct.title+"</b><br>"+d.exptl[0].method;
});

}

// 🔥 extract sequence from PDB
function extractSequence(pdb){

let lines = pdb.split("\n");
let seq = "";

lines.forEach(l=>{
if(l.startsWith("SEQRES")){
seq += l.substring(19).trim().replace(/\s+/g,"");
}
});

return seq;
}

// 🔥 simple similarity
function similarity(a,b){

let len = Math.min(a.length,b.length);
let match = 0;

for(let i=0;i<len;i++){
if(a[i]===b[i]) match++;
}

return ((match/len)*100).toFixed(2);
}

</script>

</body>
</html>
